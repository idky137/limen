[package]
name = "limen-light"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Minimal no_std runtime for embedded targets for Limen."

[features]
default = ["std"]
std = []
alloc = []
serde = ["dep:serde"]

[dependencies]
limen-core = { path = "../limen-core" }
serde = { version = "1.0", features = ["derive"], optional = true }
