[package]
name = "limen"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Dynamic runtime with configuration-driven orchestration for Limen."

[features]
default = ["std"]
std = []
watch-config = []
serde = ["dep:serde"]
toml = ["dep:toml"]
tracing = ["dep:tracing"]
metrics = ["dep:metrics"]

[dependencies]
limen-core = { path = "../limen-core" }
serde = { version = "1.0", features = ["derive"], optional = true }
toml = { version = "0.8", optional = true }
tracing = { version = "0.1", optional = true }
metrics = { version = "0.23", optional = true }
